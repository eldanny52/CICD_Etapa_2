
name: Hello World API Test

on:
  push:
    branches: [ main ]


jobs:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v2
      uses: actions/setup-node@v2
      with:
        node-version: '18'

      name: Install newman
      run: npm install -g newman
        new m an -reporter-html extra

    - name: Run API Tests
      run: newman run postman_collection.json -r html --reporter-html-export newman_report.html
name: Hello World API Test

on:
  push:
    branches: [ main ]

jobs:
  api-testing: # ID del trabajo (faltaba este nivel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install newman and reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run API Tests
        run: newman run postman_collection.json -r htmlextra --reporter-htmlextra-export newman_report.html